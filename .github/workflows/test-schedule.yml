name: ⏰ Test Schedule Trigger

on:
  schedule:
    # 每小时执行一次，用于验证
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check schedule works
        run: |
          echo "Schedule trigger is working at $(date)"
          echo "Event: ${{ github.event_name }}"
